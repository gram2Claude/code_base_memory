# Сборка нативного движка ontoindex для Windows (CBM-3).
# Зачем: на целевой машине нет прав администратора → нет MSVC → node-gyp не может
# собрать tree-sitter (npm-пакет 0.25 публикуется без prebuilds). Раннер windows-2022 —
# та же ОС, что хост (Windows Server 2022), Node 24 → бинарно совместимый bundle.
# Триггер: push файла .github/engine-build-request (PAT без Actions:write не умеет dispatch).
# Результат: release-asset engine-bundle.tgz в релизе engine-bundle-win-node24
# (артефакты Actions недоступны нашему PAT, release-asset качается с contents:read).
name: build-engine
on:
  push:
    branches: [oleg, main]
    paths:
      - '.github/engine-build-request'
      - '.github/workflows/build-engine.yml'
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: npm ci (native builds, legacy-peer-deps)
        working-directory: ontoindex/ontoindex
        run: npm ci --legacy-peer-deps --no-fund --no-audit
      - name: build dist (tsc + super-dispatch validation)
        working-directory: ontoindex/ontoindex
        run: npm run build
      - name: grammar inventory (t03 done-criteria)
        working-directory: ontoindex/ontoindex
        run: |
          Get-ChildItem -Recurse node_modules -Filter '*.node' -ErrorAction SilentlyContinue |
            ForEach-Object { $_.FullName.Replace((Get-Location).Path + '\', '') } |
            Tee-Object grammar-inventory.txt
      - name: pack bundle (dereference file:-symlinks)
        working-directory: ontoindex/ontoindex
        run: tar -czLf engine-bundle.tgz node_modules dist grammar-inventory.txt
      - name: publish as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = 'engine-bundle-win-node24'
          gh release delete $tag --yes --cleanup-tag 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host 'no previous release' }
          gh release create $tag ontoindex/ontoindex/engine-bundle.tgz `
            --title 'Engine bundle (win32-x64, Node 24)' `
            --notes ('built from ' + $env:GITHUB_SHA + ' on windows-2022') `
            --target $env:GITHUB_SHA
